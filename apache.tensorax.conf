<VirtualHost *:80>
    ServerName YOUR_DOMAIN_OR_IP

    # Increase body size limit for image uploads (matches Express 50mb limit)
    LimitRequestBody 62914560

    ProxyPreserveHost On
    ProxyRequests Off

    # Forward everything to the Express app
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Generous timeouts for image/video generation (can take 30-60s)
    ProxyTimeout 120
    Timeout      120

    ErrorLog  ${APACHE_LOG_DIR}/tensorax-error.log
    CustomLog ${APACHE_LOG_DIR}/tensorax-access.log combined
</VirtualHost>
